<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Student Portal | Accessibility Services & Accommodations</title>

  <link rel="stylesheet" href="https://use.typekit.net/ite5prp.css" />
  <link rel="stylesheet" href="/assets/css/main.css" />
</head>
<body data-page="student-portal">
  <a class="skip-link" href="#main">Skip to main content</a>

  <div data-include="/components/header.html"></div>

  <main id="main" class="page-main">
    <div data-include="/components/hero-home.html"></div>

    <section class="content-grid">
      <aside class="portal-sidebar">
        <div data-include="/components/resources/resources-student-actions.html"></div>
        <div data-include="/components/resources/resources-home.html"></div>
        <div data-include="/components/shared/office-contact-card.html"></div>
      </aside>
      <section class="main-content" aria-labelledby="student-portal-title">
        <h1 id="student-portal-title" class="visually-hidden">Student portal</h1>

        <div data-include="/components/workflows/asa-student-journey.html"></div>

        <div data-include="/components/tabs/student-dashboard-tabs.html"></div>

        <section class="asa-resource-panel" aria-labelledby="student-asa-resources-title">
          <div class="asa-resource-panel__header">
            <div>
              <h2 id="student-asa-resources-title">ASA Resources</h2>
              <p class="asa-resource-panel__intro">
                Download current Accessibility Services and Accommodations resources for students.
              </p>
            </div>
          </div>

          <div
            class="asa-resource-list"
            id="student-asa-resource-list"
            data-asa-resource-list
            data-audience="student"
          >
            <div class="faculty-empty-state">Loading ASA resources...</div>
          </div>
        </section>
        <div data-include="/components/accordions/faq-student.html"></div>
      </section>
    </section>
  </main>

  <div data-include="/components/footer.html"></div>

  <script type="module" src="/assets/js/main.js"></script>
</body>
</html>
